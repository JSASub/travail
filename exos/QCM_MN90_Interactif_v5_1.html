<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QCM Tables MN90 — JSAS Périgueux</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #eef2f8; color: #1a1a2e; }

header {
  background: linear-gradient(135deg, #003F7F, #005faa, #0070C0);
  color: white; text-align: center;
  padding: 1.8rem 1rem 1.4rem;
  box-shadow: 0 4px 18px rgba(0,0,0,0.25);
}
header .emoji { font-size: 2.8rem; display: block; margin-bottom: 0.3rem; }
header h1 { font-size: 1.7rem; font-weight: 900; }
header .sub { font-size: 0.9rem; opacity: 0.8; margin-top: 0.3rem; }

.progress-wrap { background: rgba(0,0,0,0.25); height: 8px; }
.progress-bar  { height: 8px; background: #7dd4fc; width: 0%; transition: width 0.4s; }

.stats-bar {
  display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
  background: #d8e8f8; padding: 0.5rem 1rem;
  font-size: 0.83rem; font-weight: 700; color: #003F7F;
}

/* Onglets */
.tabs {
  display: flex; background: #003F7F; overflow-x: auto; position: sticky; top: 0; z-index: 100;
}
.tab-btn {
  flex: 1; min-width: 110px; padding: 0.7rem 0.4rem;
  background: transparent; color: rgba(255,255,255,0.6);
  border: none; cursor: pointer; font-size: 0.83rem; font-weight: 700;
  border-bottom: 3px solid transparent; transition: all 0.2s; white-space: nowrap;
}
.tab-btn:hover { color: white; background: rgba(255,255,255,0.08); }
.tab-btn.active { color: white; border-bottom-color: #7dd4fc; background: rgba(255,255,255,0.12); }
.tab-btn .score-badge {
  display: inline-block; margin-left: 4px;
  background: rgba(255,255,255,0.2); border-radius: 10px;
  padding: 1px 6px; font-size: 0.72rem;
}

.tab-content { display: none; }
.tab-content.active { display: block; }

main { max-width: 820px; margin: 0 auto; padding: 1.2rem 1rem 4rem; }

/* Carte question */
.q-card {
  background: white; border-radius: 12px;
  padding: 1.2rem 1.3rem 1rem; margin-bottom: 1rem;
  box-shadow: 0 2px 10px rgba(0,63,127,0.08);
  border-left: 5px solid #0070C0; transition: border-color 0.3s;
}
.q-card.correct { border-left-color: #1A6B1A; }
.q-card.wrong   { border-left-color: #B00000; }
.q-card.simple      { border-left-color: #0070C0; }
.q-card.successive  { border-left-color: #1A6B1A; }
.q-card.consecutive { border-left-color: #9A6F00; }
.q-card.anomalie    { border-left-color: #B00000; }

.q-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
.q-num  { font-size: 0.7rem; font-weight: 800; color: #0070C0; text-transform: uppercase; letter-spacing: 1.5px; }
.q-type {
  font-size: 0.7rem; padding: 2px 9px; border-radius: 20px; font-weight: 700;
}
.badge-simple      { background: #ddeeff; color: #003F7F; }
.badge-successive  { background: #e6f4e6; color: #1A6B1A; }
.badge-consecutive { background: #fff3d0; color: #7A5000; }
.badge-anomalie    { background: #ffeaea; color: #B00000; }

.q-text { font-size: 0.97rem; font-weight: 700; margin-bottom: 0.9rem; line-height: 1.55; color: #111; }

.choices { display: flex; flex-direction: column; gap: 0.38rem; }
.choice {
  display: flex; align-items: flex-start; gap: 0.65rem;
  padding: 0.5rem 0.85rem; border: 2px solid #cdd8ea;
  border-radius: 8px; cursor: pointer; font-size: 0.9rem;
  background: #f7fafd; transition: all 0.15s; line-height: 1.4;
}
.choice:hover:not(.disabled) { border-color: #0070C0; background: #e8f2ff; }
.choice.selected   { border-color: #0070C0; background: #ddeeff; }
.choice.correct-ans{ border-color: #1A6B1A; background: #e6f4e6; color: #1A6B1A; font-weight: 700; }
.choice.wrong-ans  { border-color: #B00000; background: #ffeaea; color: #B00000; }
.choice.disabled   { cursor: default; }
.circle {
  width: 26px; height: 26px; min-width: 26px; border-radius: 50%;
  border: 2px solid #aab; display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 0.78rem; color: #555; background: white; flex-shrink: 0; margin-top: 1px;
}
.choice.selected .circle    { border-color: #0070C0; color: #003F7F; background: #cce4ff; }
.choice.correct-ans .circle { border-color: #1A6B1A; color: white; background: #1A6B1A; }
.choice.wrong-ans .circle   { border-color: #B00000; color: white; background: #B00000; }

.btn-valider {
  margin-top: 0.8rem; padding: 0.42rem 1.2rem;
  background: #0070C0; color: white; border: none;
  border-radius: 7px; cursor: pointer; font-size: 0.85rem; font-weight: 700;
}
.btn-valider:hover { background: #005a9e; }
.btn-valider:disabled { background: #b0c4d8; cursor: default; }

.explication {
  display: none; margin-top: 0.8rem; padding: 0.65rem 0.9rem;
  border-radius: 8px; font-size: 0.85rem; line-height: 1.6;
}
.explication.ok { background: #e6f4e6; border-left: 4px solid #1A6B1A; color: #14501A; }
.explication.ko { background: #ffeaea; border-left: 4px solid #B00000; color: #7a0000; }
.explication strong { display: block; margin-bottom: 0.3rem; }
.explication ul { padding-left: 1.2rem; margin-top: 0.3rem; }
.explication li { margin-bottom: 0.2rem; }

/* Score panel */
#score-panel {
  display: none; position: fixed; inset: 0;
  background: rgba(0,20,50,0.65); z-index: 300;
  align-items: center; justify-content: center;
}
#score-panel.visible { display: flex; }
.score-box {
  background: white; border-radius: 18px;
  padding: 2rem 1.8rem; max-width: 520px; width: 94%;
  text-align: center; box-shadow: 0 24px 60px rgba(0,0,0,0.35);
  max-height: 90vh; overflow-y: auto;
}
.score-num { font-size: 3.5rem; font-weight: 900; color: #003F7F; }
.mention {
  display: inline-block; margin: 0.6rem 0;
  font-size: 1.1rem; font-weight: 800;
  padding: 0.4rem 1.1rem; border-radius: 8px;
}
.mention.excellent  { background: #e6f4e6; color: #1A6B1A; }
.mention.bien       { background: #ddeeff; color: #003F7F; }
.mention.moyen      { background: #fff3e0; color: #c45000; }
.mention.insuffisant{ background: #ffeaea; color: #B00000; }

.score-detail {
  display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem;
  margin: 0.8rem 0; font-size: 0.85rem;
}
.score-detail-item {
  background: #f5f7fa; border-radius: 8px; padding: 0.5rem 0.7rem;
  display: flex; justify-content: space-between; align-items: center;
}
.score-detail-item .pts { font-weight: 800; font-size: 1rem; }

.btn-reset {
  margin-top: 1rem; padding: 0.65rem 1.8rem;
  background: linear-gradient(135deg, #003F7F, #0070C0);
  color: white; border: none; border-radius: 9px;
  font-size: 0.95rem; font-weight: 700; cursor: pointer;
}
.btn-voir-score {
  display: block; margin: 1.5rem auto 0; padding: 0.8rem 2rem;
  background: linear-gradient(135deg, #003F7F, #0070C0);
  color: white; border: none; border-radius: 10px;
  font-size: 0.95rem; font-weight: 700; cursor: pointer;
  box-shadow: 0 4px 14px rgba(0,63,127,0.3);
}
.btn-voir-score:disabled { opacity: 0.4; cursor: default; }

/* Légende */
.legende {
  display: flex; flex-wrap: wrap; gap: 0.5rem;
  margin: 1rem 0 1.2rem; font-size: 0.8rem;
}
.leg-item {
  padding: 4px 12px; border-radius: 20px; font-weight: 700;
  cursor: pointer; opacity: 0.8; transition: opacity 0.15s;
}
.leg-item:hover { opacity: 1; }
.leg-item.active { opacity: 1; box-shadow: 0 2px 6px rgba(0,0,0,0.15); }

@media (max-width: 560px) {
  header h1 { font-size: 1.3rem; }
  .tab-btn { font-size: 0.74rem; padding: 0.6rem 0.25rem; min-width: 85px; }
  .score-detail { grid-template-columns: 1fr; }
}
</style>
</head>

</div>

// ── ÉTAT ──
let reponses = {}, validees = {};
const types = ['simple','successive','consecutive','anomalie'];

function showTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  if (btn) btn.classList.add('active');
}

// ── RENDU ──
function renderAll() {
  renderSection('tout', exercices);
  types.forEach(t => renderSection(t, exercices.filter(e => e.type === t)));
  majStats();
}

function renderSection(id, list) {
  const main = document.getElementById('main-' + id);
  main.innerHTML = '';

  list.forEach(e => {
    const card = document.createElement('div');
    card.id = 'card-' + id + '-' + e.num;
    const isVal = validees[e.num], repU = reponses[e.num], ok = repU === e.rep;
    card.className = `q-card ${e.type}${isVal ? (ok ? ' correct' : ' wrong') : ''}`;

    const choixHTML = ['A','B','C','D'].map(l => {
      let cls = 'choice';
      if (repU === l) cls += ' selected';
      if (isVal && l === e.rep) cls += ' correct-ans';
      if (isVal && repU === l && l !== e.rep) cls += ' wrong-ans';
      if (isVal) cls += ' disabled';
      return `<div class="${cls}" onclick="sel(${e.num},'${l}','${id}')">
        <div class="circle">${l}</div><span>${e[l]}</span></div>`;
    }).join('');

    const explHTML = e.expl.map(l => `<li>${l}</li>`).join('');
    const badgeCls = `q-type badge-${e.type}`;

    card.innerHTML = `
      <div class="q-meta">
        <span class="q-num">Question ${String(e.num).padStart(2,'0')}/30</span>
        <span class="${badgeCls}">${e.label}</span>
      </div>
      <div class="q-text">${e.q}</div>
      <div class="choices" id="ch-${id}-${e.num}">${choixHTML}</div>
      ${!isVal ? `<button class="btn-valider" id="btn-${id}-${e.num}" onclick="valider(${e.num},'${id}')" ${repU?'':'disabled'}>Valider</button>` : ''}
      <div class="explication ${isVal?(ok?'ok':'ko'):''}" style="display:${isVal?'block':'none'}">
        <strong>${ok ? '✅ Bonne réponse !' : `❌ Réponse correcte : ${e.rep}`}</strong>
        <ul>${explHTML}</ul>
      </div>`;
    main.appendChild(card);
  });

  // Bouton score uniquement sur "tout"
  if (id === 'tout') {
    const allDone = exercices.every(e => validees[e.num]);
    const btn = document.createElement('button');
    btn.className = 'btn-voir-score';
    btn.textContent = '🏆 Voir mon score final';
    btn.onclick = showScore;
    btn.disabled = !allDone;
    main.appendChild(btn);
  }
}

function sel(num, lettre, section) {
  if (validees[num]) return;
  reponses[num] = lettre;
  // Mettre à jour dans toutes les sections
  ['tout', ...types].forEach(id => {
    const ch = document.getElementById(`ch-${id}-${num}`);
    if (!ch) return;
    ch.querySelectorAll('.choice').forEach((c, i) => {
      c.className = 'choice' + (['A','B','C','D'][i] === lettre ? ' selected' : '');
    });
    const btn = document.getElementById(`btn-${id}-${num}`);
    if (btn) btn.disabled = false;
  });
}

function valider(num, section) {
  if (!reponses[num]) return;
  validees[num] = true;
  renderAll();
  // Scroll vers prochaine question dans la section active
  const nextQ = exercices.find(e => !validees[e.num]);
  if (nextQ) {
    const activeTab = document.querySelector('.tab-content.active').id.replace('tab-', '');
    const nextCard = document.getElementById(`card-${activeTab}-${nextQ.num}`);
    if (nextCard) setTimeout(() => nextCard.scrollIntoView({ behavior: 'smooth', block: 'start' }), 80);
  }
}

function majStats() {
  const t = Object.keys(validees).length;
  const ok = exercices.filter(e => validees[e.num] && reponses[e.num] === e.rep).length;
  document.getElementById('statTotal').textContent = t;
  document.getElementById('statOk').textContent = ok;
  document.getElementById('statKo').textContent = t - ok;
  document.getElementById('statScore').textContent = t > 0 ? Math.round(ok/t*100) : 0;
  document.getElementById('progressBar').style.width = (t / 30 * 100) + '%';

  // Badges onglets
  const totals = { simple: 10, successive: 10, consecutive: 5, anomalie: 5 };
  types.forEach(tp => {
    const tpExs = exercices.filter(e => e.type === tp);
    const tpOk = tpExs.filter(e => validees[e.num] && reponses[e.num] === e.rep).length;
    const tpDone = tpExs.filter(e => validees[e.num]).length;
    document.getElementById('badge-' + tp).textContent = `${tpOk}/${totals[tp]}`;
  });
  document.getElementById('badge-tout').textContent = `${ok}/30`;
}

function showScore() {
  const ok = exercices.filter(e => validees[e.num] && reponses[e.num] === e.rep).length;
  document.getElementById('finalScore').textContent = `${ok}/30`;
  const ml = document.getElementById('finalMention');
  if (ok >= 27)     { ml.className = 'mention excellent';   ml.textContent = '🌟 Excellent !'; }
  else if (ok >= 21){ ml.className = 'mention bien';        ml.textContent = '👍 Bien'; }
  else if (ok >= 15){ ml.className = 'mention moyen';       ml.textContent = '⚠️ À revoir'; }
  else              { ml.className = 'mention insuffisant'; ml.textContent = '❌ Insuffisant'; }

  const totals = { simple: 10, successive: 10, consecutive: 5, anomalie: 5 };
  const labels = { simple: '🔵 Simples', successive: '🟢 Successives', consecutive: '🟡 Consécutives', anomalie: '🔴 Anomalies' };
  const detail = document.getElementById('scoreDetail');
  detail.innerHTML = types.map(tp => {
    const tpOk = exercices.filter(e => e.type === tp && validees[e.num] && reponses[e.num] === e.rep).length;
    return `<div class="score-detail-item"><span>${labels[tp]}</span><span class="pts">${tpOk}/${totals[tp]}</span></div>`;
  }).join('');

  document.getElementById('score-panel').classList.add('visible');
}

function reinit() {
  reponses = {}; validees = {};
  document.getElementById('score-panel').classList.remove('visible');
  renderAll();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

renderAll();
</script>
